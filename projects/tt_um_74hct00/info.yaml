# Tiny Tapeout project information
project:
  title:        "74HCT00 Quad 2-Input NAND (3.3 V)"
  author:       "Vipul Sharma"
  discord:      ""
  description:  "Open-source silicon realization of 74HCT00 TTL-compatible quad 2-input NAND on gf180mcuD at 3.3 V"
  language:     "Analog"
  clock_hz:     0

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x2"          # Valid values for analog projects: 1x2, 2x2, 3x2, 4x2

  # How many analog pins does your project use?
  analog_pins: 5        # ua[0..3]: 4 NAND outputs; ua[4]: A1 input (logic drive + HCT-window DC sweep)
  uses_vapwr: false     # 3.3 V on VDPWR only; no second analog supply needed

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_74hct00"

  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs. NOTE: Gate 1's A input is NOT on a digital ui pin; it is on
  # ua[4] (analog) so a slow DC ramp can characterise the HCT input window
  # on silicon. A digital pad's CMOS buffer would snap any intermediate
  # voltage to 0/3.3 V before it reached the gate.
  ui[0]: ""
  ui[1]: "B1 (Gate 1 input B)"
  ui[2]: "A2 (Gate 2 input A)"
  ui[3]: "B2 (Gate 2 input B)"
  ui[4]: "A3 (Gate 3 input A)"
  ui[5]: "B3 (Gate 3 input B)"
  ui[6]: "A4 (Gate 4 input A)"
  ui[7]: "B4 (Gate 4 input B)"

  # Outputs (unused -- NAND outputs are on the analog pins instead, for VOH/VOL at ±4 mA)
  uo[0]: ""
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins (unused)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

  # Analog pins - make sure to also set "analog_pins" above, else the pins won't be connected
  ua[0]: "Y1 (Gate 1 output)"
  ua[1]: "Y2 (Gate 2 output)"
  ua[2]: "Y3 (Gate 3 output)"
  ua[3]: "Y4 (Gate 4 output)"
  ua[4]: "A1 (Gate 1 input A; 0/3.3 V for truth table, slow DC ramp 0->3.3 V for HCT window)"
  ua[5]: ""

# Do not change!
yaml_version: 6
