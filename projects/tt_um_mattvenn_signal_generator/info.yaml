# Tiny Tapeout project information
project:
  title:        "Simple Signal Generator"
  author:       "Matt Venn"
  discord:      "mattvenn"
  description:  "Square wave generator with a phase-shifting second channel for metastability experiments"
  language:     "Verilog"
  clock_hz:     50000000

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_mattvenn_signal_generator"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "phase_counter.sv"
    - "sq_wave_gen.sv"
    - "phase_shifted_gen.sv"
    - "enc_decoder.sv"
    - "spi_wrapper.sv"
    - "spi_reg.sv"
    - "rising_edge_detector.sv"
    - "falling_edge_detector.sv"
    - "synchronizer.sv"
    - "reclocking.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "SPI CPOL"
  ui[1]: "SPI CPHA"
  ui[2]: "Encoder button (hold for 8x fast-scan)"
  ui[3]: ""
  ui[4]: "Encoder A"
  ui[5]: "Encoder B"
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "Channel 0 square wave output"
  uo[1]: "Channel 1 square wave output"
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: "SPI MISO"
  uio[4]: "SPI CS_N (active low)"
  uio[5]: "SPI CLK"
  uio[6]: "SPI MOSI"
  uio[7]: ""

# Do not change!
yaml_version: 6
